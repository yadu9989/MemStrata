name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
# Saves CI minutes during rapid iteration on a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint runs once on Ubuntu+3.12; output applies to every matrix combo.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check memstrata tests

  # ── Boundary check — enforces docs/hard-rules.md Rule 6
  #    (Open code never imports Pro code).
  #
  #    Fails the build if any line in memstrata/ or tests/ is a
  #    top-level OR nested `from X import …` / `import X.…` where X is
  #    a Pro package. Comment and string references are intentionally
  #    NOT matched — only real import statements.
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for Pro imports
        shell: bash
        run: |
          set -o pipefail
          PATTERN='^[[:space:]]*(from|import)[[:space:]]+(memstrata_pro|harness|billing)([[:space:]]|\.|$)'
          if grep -rnE "$PATTERN" --include='*.py' memstrata tests; then
            echo ""
            echo "::error::Pro imports found in Open code."
            echo "::error::This violates Rule 6 of docs/hard-rules.md."
            echo "::error::The Open repo contains zero imports of"
            echo "::error::memstrata_pro / harness / billing by design."
            echo "::error::If the Open code needs Pro behaviour, declare an"
            echo "::error::app.state.X injection point in api_server.py and"
            echo "::error::let the Pro overlay populate it at startup."
            exit 1
          fi
          echo "Boundary check passed: no Pro imports in memstrata/ or tests/"

  # ── Test matrix across the supported Python and OS combinations.
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Wheels-first install. ci-constraints.txt pins every
      # native-extension dep to an exact version; --only-binary=:all:
      # forces pip to use prebuilt wheels for those deps. CI runners
      # that built tree-sitter from source produced ABI-mismatched
      # binaries that access-violated on Windows cp310/cp311. The
      # fallback line drops --only-binary so the build doesn't fail
      # hard if a wheel is genuinely missing for a niche transitive
      # dep — but the constraint pins still apply.
      - name: Install dev dependencies (CI — prefer wheels)
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --only-binary=:all: -c ci-constraints.txt -e ".[dev]" \
            || python -m pip install -c ci-constraints.txt -e ".[dev]"
      # Fail fast if the native bindings can't even import — much
      # clearer signal than a segfault 200 tests into the run.
      - name: Verify native bindings import
        shell: bash
        run: |
          python - <<'PY'
          import sys
          failed = []
          for mod in (
              "tree_sitter",
              "tree_sitter_python._binding",
              "tree_sitter_javascript._binding",
              "tree_sitter_typescript._binding",
              "sqlite_vec",
          ):
              try:
                  __import__(mod)
              except Exception as e:
                  failed.append((mod, repr(e)))
          if failed:
              for mod, err in failed:
                  print(f"::error::{mod}: {err}")
              sys.exit(1)
          print("Native bindings imported OK on", sys.platform, sys.version)
          PY
      - name: Pytest
        run: pytest -ra
